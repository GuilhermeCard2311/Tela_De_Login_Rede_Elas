<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tela Inicial</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
    <script src="assets/js/login.js" defer></script>
</head>

<body>

    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-100">

            <!-- Lado esquerdo -->
            <div class="col-md-6 d-none d-md-block">
                <img src="assets/img/lateral.png" class="layout__image" alt="">
            </div>

            <!-- Lado direito -->
            <div class="col-12 col-md-6 d-flex justify-content-center align-items-center layout__right">

                <div class="card auth-card">

                   <h3 class="auth-card__title">Insira suas credenciais para fazer login!</h3>

                    <form class="Login-Usuario">

                        <div class="mb-3">
                            <label for="email">Email: <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" placeholder="Seu email" required>
                        </div>

                        <div class="mb-3">
                            <label for="password">Senha: <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" placeholder="Sua senha" required>
                        </div>

                        <button type="submit" class="btn auth-card__button w-100">
                            Fazer Login
                        </button>

                    </form>
                </div>

            </div>

        </div>
    </div>

</body>

</html>
