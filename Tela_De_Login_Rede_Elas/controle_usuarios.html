<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/controle_usuarios.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/controle_usuarios.js" defer></script>
</head>

<body>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Usuários</h1>

        <div id="lista" class="list-group"></div>
    </div>

    <!-- Janela Modal -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Editar Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formEditar">

                        <input type="hidden" id="editId">

                        <div class="mb-2">
                            <label>Nome</label>
                            <input type="text" id="editNome" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Email</label>
                            <input type="email" id="editEmail" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>CPF</label>
                            <input type="text" id="editCpf" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label>Nível</label>
                            <select id="editNivel" class="form-control">
                                <option value="usuario">Usuário</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
